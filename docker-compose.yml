services:
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:gemma4-cu130}
    container_name: vllm-server
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    shm_size: "64gb"
    ports:
      - "${VLLM_PORT:-8000}:${VLLM_PORT:-8000}"
    environment:
      - VLLM_FLASHINFER_MOE_BACKEND=latency
      - VLLM_TEST_FORCE_FP8_MARLIN=${VLLM_TEST_FORCE_FP8_MARLIN:-0}
      - VLLM_USE_DEEP_GEMM=${VLLM_USE_DEEP_GEMM:-1}
      - HF_TOKEN=${HF_TOKEN}
      - HF_MODEL_ID=${HF_MODEL_ID:-google/gemma-4-26B-A4B-it}
      - SERVED_MODEL_NAME=${SERVED_MODEL_NAME:-gemma-4-26b}
      - VLLM_PORT=${VLLM_PORT:-8000}
      - KV_CACHE_DTYPE=${KV_CACHE_DTYPE:-fp8}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-131072}
      - MAX_NUM_BATCHED_TOKENS=${MAX_NUM_BATCHED_TOKENS:-8192}
      - GPU_MEMORY_UTIL=${GPU_MEMORY_UTIL:-0.75}
      - MAX_NUM_SEQS=${MAX_NUM_SEQS:-4}
      - VLLM_EXTRA_FLAGS=${VLLM_EXTRA_FLAGS:---no-enable-prefix-caching}
      - VLLM_ENABLE_THINKING_DEFAULT=${VLLM_ENABLE_THINKING_DEFAULT:-}
    volumes:
      - ${HF_CACHE:-~/.cache/huggingface}:/root/.cache/huggingface
      - ./vllm-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VLLM_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    restart: unless-stopped
    networks:
      - dgx-net

  ocr:
    build:
      context: ./ocr
      dockerfile: Dockerfile
    container_name: ocr-service
    ports:
      - "${OCR_PORT:-8001}:${OCR_PORT:-8001}"
    environment:
      - VLLM_BASE_URL=http://vllm:${VLLM_PORT:-8000}
      - VLLM_MODEL=${SERVED_MODEL_NAME:-gemma-4-26b}
      - OCR_PORT=${OCR_PORT:-8001}
      - OCR_CHUNK_SIZE=${OCR_CHUNK_SIZE:-6}
      - OCR_OVERLAP=${OCR_OVERLAP:-2}
      - OCR_DPI=${OCR_DPI:-200}
      - OCR_MAX_TOKENS=${OCR_MAX_TOKENS:-16384}
      - OCR_TEMPERATURE=${OCR_TEMPERATURE:-0.1}
      - OCR_MAX_CONCURRENT_CHUNKS=${OCR_MAX_CONCURRENT_CHUNKS:-4}
      - OCR_MIN_CHARS_PER_PAGE=400
      - OCR_MAX_RETRIES=2
      - OCR_MAX_PAGES=${OCR_MAX_PAGES:-200}
      - OCR_MAX_FILE_SIZE_MB=${OCR_MAX_FILE_SIZE_MB:-100}
    depends_on:
      vllm:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dgx-net

networks:
  dgx-net:
    name: dgx-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${DGX_NET_SUBNET:-10.10.99.0/24}
          gateway: ${DGX_NET_GATEWAY:-10.10.99.1}
