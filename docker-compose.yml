services:
  vllm:
    image: vllm/vllm-openai:gemma4-cu130
    container_name: vllm-gemma4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    shm_size: "64gb"
    ports:
      - "${VLLM_PORT:-8000}:${VLLM_PORT:-8000}"
    environment:
      - VLLM_FLASHINFER_MOE_BACKEND=latency
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ${HF_CACHE:-~/.cache/huggingface}:/root/.cache/huggingface
    command:
      - --model
      - google/gemma-4-26B-A4B-it
      - --served-model-name
      - gemma-4-26b
      - --host
      - "0.0.0.0"
      - --port
      - "${VLLM_PORT:-8000}"
      - --kv-cache-dtype
      - "${KV_CACHE_DTYPE:-fp8}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-131072}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTIL:-0.75}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-4}"
      - --trust-remote-code
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VLLM_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    restart: unless-stopped

  ocr:
    build:
      context: ./ocr
      dockerfile: Dockerfile
    container_name: ocr-service
    ports:
      - "${OCR_PORT:-8001}:${OCR_PORT:-8001}"
    environment:
      - VLLM_BASE_URL=http://vllm:${VLLM_PORT:-8000}
      - VLLM_MODEL=gemma-4-26b
      - OCR_PORT=${OCR_PORT:-8001}
      - OCR_CHUNK_SIZE=${OCR_CHUNK_SIZE:-6}
      - OCR_OVERLAP=${OCR_OVERLAP:-2}
      - OCR_DPI=${OCR_DPI:-200}
      - OCR_MAX_TOKENS=${OCR_MAX_TOKENS:-16384}
      - OCR_TEMPERATURE=${OCR_TEMPERATURE:-0.1}
      - OCR_MAX_CONCURRENT_CHUNKS=${OCR_MAX_CONCURRENT_CHUNKS:-4}
      - OCR_MIN_CHARS_PER_PAGE=400
      - OCR_MAX_RETRIES=2
      - OCR_MAX_PAGES=${OCR_MAX_PAGES:-200}
      - OCR_MAX_FILE_SIZE_MB=${OCR_MAX_FILE_SIZE_MB:-100}
    depends_on:
      vllm:
        condition: service_healthy
    restart: unless-stopped
